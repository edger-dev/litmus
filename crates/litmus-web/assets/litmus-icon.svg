<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#1a1b26"/>
  <!-- Litmus strip: a vertical strip that changes color along its length -->
  <rect x="8" y="4" width="5" height="24" rx="2.5" fill="url(#litmus-grad)"/>
  <!-- Horizontal bar at bottom -->
  <rect x="8" y="22" width="16" height="5" rx="2.5" fill="url(#litmus-grad-h)"/>
  <defs>
    <linearGradient id="litmus-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="50%" stop-color="#ffd93d"/>
      <stop offset="100%" stop-color="#6bcb77"/>
    </linearGradient>
    <linearGradient id="litmus-grad-h" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6bcb77"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
  </defs>
</svg>
